name: Release (PyPI + Binaries)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/r105
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine && python -m build && twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1

  binary-linux:
    name: Build Linux binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install pyinstaller .
      - name: Build standalone binary
        run: |
          pyinstaller --onefile --name r105 \
            --hidden-import=r105.cli \
            --hidden-import=r105.tui \
            --hidden-import=r105.tui.screens \
            --hidden-import=r105.tui.widgets \
            --hidden-import=r105.themes \
            --add-data "r105/themes:r105/themes" \
            r105/__main__.py
      - uses: actions/upload-artifact@v4
        with:
          name: r105-linux
          path: dist/r105

  binary-macos:
    name: Build macOS binary
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install pyinstaller .
      - name: Build standalone binary
        run: |
          pyinstaller --onefile --name r105 \
            --hidden-import=r105.cli \
            --hidden-import=r105.tui \
            --hidden-import=r105.tui.screens \
            --hidden-import=r105.tui.widgets \
            --hidden-import=r105.themes \
            --add-data "r105/themes:r105/themes" \
            r105/__main__.py
      - uses: actions/upload-artifact@v4
        with:
          name: r105-macos
          path: dist/r105

  update-formulas:
    name: Update Homebrew & Scoop formulas
    runs-on: ubuntu-latest
    needs: [pypi]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract version from tag
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Get sdist SHA256 from PyPI
        run: |
          URL="https://files.pythonhosted.org/packages/source/r/r105/r105-${RELEASE_VERSION}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "SDIST_SHA256=$SHA" >> $GITHUB_ENV

      - name: Update Homebrew formula
        run: |
          cat > docs/homebrew.rb << 'EOF'
          class R105 < Formula
            include Language::Python::Virtualenv

            desc "r105 — Beyond the prompt. Rich terminal AI assistant for any OpenAI-compatible backend."
            homepage "https://github.com/bnelabs/r105"
            url "https://files.pythonhosted.org/packages/source/r/r105/r105-${RELEASE_VERSION}.tar.gz"
            sha256 "${SDIST_SHA256}"
            license "MIT"

            depends_on "python@3.12"

            def install
              virtualenv_install_with_resources
            end

            test do
              assert_match "r105 #{version}", shell_output("#{bin}/r105 --version")
            end
          end
          EOF
          # Use envsubst to replace vars (heredoc with single quotes prevents substitution)
          envsubst < docs/homebrew.rb > docs/homebrew.rb.tmp && mv docs/homebrew.rb.tmp docs/homebrew.rb

      - name: Update Scoop formula
        run: |
          PYPI_URL="https://files.pythonhosted.org/packages/source/r/r105/r105-${RELEASE_VERSION}.tar.gz"
          jq --arg url "$PYPI_URL" --arg sha "${SDIST_SHA256}" \
            '.url = $url | .hash = $sha' \
            docs/scoop.json > docs/scoop.json.tmp && mv docs/scoop.json.tmp docs/scoop.json

      - name: Commit and push formula updates
        run: |
          git config user.name "r105 release bot"
          git config user.email "bot@r105.dev"
          git add docs/homebrew.rb docs/scoop.json
          git diff --staged --quiet || \
            git commit -m "Update Homebrew/Scoop formulas for v${RELEASE_VERSION}" && \
            git push

  release:
    name: Create GitHub Release
    needs: [pypi, binary-linux, binary-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: r105-linux
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: r105-macos
          path: artifacts/macos
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux/r105
            artifacts/macos/r105
          generate_release_notes: true
