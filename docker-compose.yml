# r105 + llama-router quick-start stack
# Usage:
#   docker-compose up -d llama-router  # start the router
#   docker-compose run r105 chat       # launch the TUI

services:
  r105:
    build: .
    stdin_open: true
    tty: true
    volumes:
      - ~/.config/r105:/root/.config/r105
      - r105-workspace:/root/r105-workspace
    environment:
      - R105_URL=http://llama-router:8010
    depends_on:
      - llama-router

  llama-router:
    image: ghcr.io/bnelabs/llama-router:latest
    ports:
      - "8010:8010"
    volumes:
      - ~/.config/llama-router:/root/.config/llama-router
    command: ["--config", "/root/.config/llama-router/router.yaml"]

volumes:
  r105-workspace:
